<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>86서 QI 매뉴얼 챗봇</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <!-- 헤더 -->
    <div class="header">
      <div class="hospital-bar">
        <div class="hospital-logo">
          <div class="hospital-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M12 2L2 7v10l10 5 10-5V7L12 2z" stroke="white" stroke-width="1.8" stroke-linejoin="round"/>
              <path d="M12 2v20M2 7l10 5 10-5" stroke="white" stroke-width="1.8" stroke-linejoin="round"/>
            </svg>
          </div>
          <div>
            <div class="hospital-name">칠곡경북대학교병원</div>
            <div class="hospital-name-en">Chilgok Kyungpook National University Hospital</div>
          </div>
        </div>
        <div class="status-badge"><span class="status-dot"></span>AI 온라인</div>
      </div>
      <div class="header-title-wrap">
        <div class="header-bot-icon">🏥</div>
        <div>
          <div class="header-title">86서 QI 매뉴얼 챗봇</div>
          <div class="header-sub">● 비뇨기과 · 순환기내과 · 흉부외과</div>
        </div>
      </div>
    </div>

    <!-- 메시지 영역 -->
    <div class="messages" id="messages">
      <div class="bubble bot">
        <div class="avatar bot-avatar" id="botAvatarInit"></div>
        <div class="text">
          안녕하세요! 86서 업무 지원 AI 파트너입니다. 👋<br><br>
          수술/시술 준비, 수술 후 간호, 퇴원 교육 등 궁금한 내용을 편하게 질문해 주세요.<br><br>
          ✅ 기본 프로토콜 + 📌 최신 인계 업데이트를 함께 안내해 드립니다.
        </div>
      </div>
    </div>

    <!-- 빠른 질문 -->
    <div class="quick-wrap">
      <div class="quick-label">⚡ 빠른 질문</div>
      <div class="quick-btns" id="quickBtns">
        <button onclick="sendQuick('RALP 수술 전 준비 뭐야?')">🔪 RALP 준비</button>
        <button onclick="sendQuick('CAG 시술 후 뭐 해?')">💊 CAG 이후</button>
        <button onclick="sendQuick('TURBT 수술 후 간호')">📋 TURBT</button>
        <button onclick="sendQuick('CABG 수술 전 준비')">🫀 CABG 준비</button>
        <button onclick="sendQuick('주요 연락처 알려줘')">📞 연락처</button>
        <button onclick="sendQuick('Heparization aPTT 기준')">💉 헤파린</button>
        <button onclick="sendQuick('복대 왜 해?')">❓ 복대 왜?</button>
        <button onclick="sendQuick('HUO notify 기준')">⚠️ HUO 기준</button>
      </div>
    </div>

    <!-- 입력창 -->
    <div class="input-wrap">
      <div class="input-box">
        <textarea
          id="inputText"
          placeholder="편하게 질문하세요. 예) 권태균교수님 환자 식이가 어떻게 돼?"
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
      <div class="input-hint">Enter 전송 · Shift+Enter 줄바꿈 · 86서 병동 전용</div>
    </div>

  </div>
  <script src="app.js"></script>
  <script>document.getElementById('botAvatarInit').innerHTML = NURSE_SVG;</script>
</body>
</html>
